name: DXVK Workflow Runs

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Get last sent run ID
        id: get_last_id
        run: |
          LAST_ID=$(cat last_dxvk_run_id.txt 2>/dev/null | tr -d "[:space:]" || echo "0")
          [ -z "$LAST_ID" ] && LAST_ID=0
          echo "last_id=$LAST_ID" >> $GITHUB_OUTPUT

      - name: Fetch recent workflow runs from doitsujin/dxvk
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/doitsujin/dxvk/actions/runs?per_page=20" > runs.json

      - name: Process and notify on new successful push-triggered runs
        env:
          WEBHOOK_URL: ${{ secrets.DXVK_WEBHOOK }}
          LAST_ID: ${{ steps.get_last_id.outputs.last_id }}
        run: |
          NEW_RUNS=$(jq "[.workflow_runs[] | select(.status==\"completed\" and .conclusion==\"success\" and .event==\"push\" and .id > $LAST_ID) | {id: .id, url: .html_url}] | sort_by(.id)" runs.json)
          COUNT=$(echo "$NEW_RUNS" | jq "length")
          if [ "$COUNT" -gt 0 ] && [ -n "$WEBHOOK_URL" ]; then
            MAX_ID=0
            for i in $(seq 0 $(($COUNT - 1))); do
              RUN_ID=$(echo "$NEW_RUNS" | jq -r ".[$i].id")
              RUN_URL=$(echo "$NEW_RUNS" | jq -r ".[$i].url")
              curl -sf -H "Content-Type: application/json" \
                -d "{\"content\": \"$RUN_URL\"}" "$WEBHOOK_URL" || true
              [ "$RUN_ID" -gt "$MAX_ID" ] && MAX_ID=$RUN_ID
            done
            echo "$MAX_ID" > last_dxvk_run_id.txt
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add last_dxvk_run_id.txt
            git commit -m "chore: update last DXVK run ID"
            git pull --rebase origin HEAD || true
            git push
          fi

