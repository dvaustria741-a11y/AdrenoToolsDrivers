name: VKD3D Pull Request Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Get last sent PR ID
        id: get_last_id
        run: |
          FILE="last_vkd3d_pr_id.txt"
          LAST_ID=$(cat "$FILE" 2>/dev/null | tr -d "[:space:]" || echo "0")
          [ -z "$LAST_ID" ] && LAST_ID=0
          echo "last_id=$LAST_ID" >> $GITHUB_OUTPUT

      - name: Fetch recent pull requests from HansKristian-Work/vkd3d-proton
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/HansKristian-Work/vkd3d-proton/pulls?per_page=30&state=all" > prs.json

      - name: Process and notify on new pull requests
        env:
          WEBHOOK_URL: ${{ secrets.VKD3D_WEBHOOK }}
          LAST_ID: ${{ steps.get_last_id.outputs.last_id }}
        run: |
          NEW_PRS=$(jq "[.[] | select(.id > $LAST_ID) | {id: .id, url: .html_url}] | sort_by(.id)" prs.json)
          COUNT=$(echo "$NEW_PRS" | jq "length")
          if [ "$COUNT" -gt 0 ] && [ -n "$WEBHOOK_URL" ]; then
            MAX_ID=$LAST_ID
            for i in $(seq 0 $(($COUNT - 1))); do
              PR_ID=$(echo "$NEW_PRS" | jq -r ".[$i].id")
              PR_URL=$(echo "$NEW_PRS" | jq -r ".[$i].url")
              curl -sf -H "Content-Type: application/json" \
                -d "{\"content\": \"$PR_URL\"}" "$WEBHOOK_URL" || true
              [ "$PR_ID" -gt "$MAX_ID" ] && MAX_ID=$PR_ID
            done
            echo "$MAX_ID" > last_vkd3d_pr_id.txt
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add last_vkd3d_pr_id.txt
            git commit -m "chore: update last VKD3D PR ID"
            git pull --rebase origin HEAD || true
            git push
          fi

