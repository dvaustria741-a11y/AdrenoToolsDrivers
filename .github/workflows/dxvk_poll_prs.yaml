name: Notify - Pull Requests

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Get last notified PR ID
        id: get_last_id
        run: |
          LAST_ID=$(cat last_own_pr_id.txt 2>/dev/null | tr -d "[:space:]")
          [ -z "$LAST_ID" ] && LAST_ID=0
          echo "last_id=$LAST_ID" >> $GITHUB_OUTPUT

      - name: Fetch recent pull requests
        run: |
          curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/dvaustria741-a11y/AdrenoToolsDrivers/pulls?per_page=20&state=all" > prs.json

      - name: Notify on new PRs
        env:
          WEBHOOK_URL: ${{ secrets.DXVK_WEBHOOK }}
          LAST_ID: ${{ steps.get_last_id.outputs.last_id }}
        run: |
          NEW=$(jq "[.[] | select(.id > ($LAST_ID | tonumber)) | {id:.id, title:.title, url:.html_url}] | sort_by(.id)" prs.json)
          COUNT=$(echo "$NEW" | jq "length")
          echo "New PRs: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            MAX_ID=$LAST_ID
            for i in $(seq 0 $(($COUNT - 1))); do
              PR_ID=$(echo "$NEW" | jq -r ".[$i].id")
              PR_TITLE=$(echo "$NEW" | jq -r ".[$i].title")
              PR_URL=$(echo "$NEW" | jq -r ".[$i].url")
              if [ -n "$WEBHOOK_URL" ]; then
                curl -sf -H "Content-Type: application/json" \
                  -d "{\"content\": \"🔀 **New PR:** ${PR_TITLE}\n${PR_URL}\"}" \
                  "$WEBHOOK_URL" || true
              fi
              [ "$PR_ID" -gt "$MAX_ID" ] && MAX_ID=$PR_ID
            done
            echo "$MAX_ID" > last_own_pr_id.txt
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add last_own_pr_id.txt
            git diff --cached --quiet || git commit -m "chore: update last notified PR ID"
            git pull --rebase origin main || git pull --rebase origin master || true
            git push
          fi
